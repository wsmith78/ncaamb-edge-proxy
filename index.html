const DW={
  adjEM_diff:0.42, efg_diff:0.28, toRate_diff:-0.22, defRebound:0.14,
  homeCourt:3.20, paceFactor:0.10, publicBias:-0.20, lineMovement:0.18,
  underdog_short:0.16, midMajorBonus:0.08, confTourney:0.09,
  restAdvantage:0.14, awayB2B:-0.28, homeB2B:-0.18,
  travelFatigue:0.20, recentFormDiff:0.05,
  learningRate:0.02,totalPredictions:0,correctPredictions:0,
  totalBets:0,winningBets:0,calibrationError:0
};

class MLModel{
  constructor(w){this.weights={...DW,...(w||{})}}
  sigmoid(x){return 1/(1+Math.exp(-x))}
  buildFeatures(he,ae,spread,isHome,isMM,lineMove,sched){
    const sc=sched||{homeRestDays:3,awayRestDays:3,homeB2B:false,awayB2B:false,travelPenalty:0,homeFormMargin:0,awayFormMargin:0};
    const emD=he.adjEM-ae.adjEM,pdD=he.pace-ae.pace;
    const drD=he.defReb-ae.defReb,toD=(ae.toRate||15)-(he.toRate||15);
    const efgD=(he.efg||50)-(ae.efg||50),sv=parseFloat(spread)||0;
    const isShortDog=!isHome&&sv>0&&sv<=4;
    const lmSig=lineMove&&Math.abs(lineMove)>=0.5?(lineMove<0?1:-1):0;
    const restAdv=Math.min(4,Math.max(-4,(sc.homeRestDays||3)-(sc.awayRestDays||3)));
    const formDiff=(sc.homeFormMargin||0)-(sc.awayFormMargin||0);
    return{
      adjEM_diff:emD,efg_diff:efgD,toRate_diff:toD,defRebound:drD,
      homeCourt:isHome?1:0,paceFactor:pdD,publicBias:Math.abs(emD)>18?-1:0,
      lineMovement:lmSig,underdog_short:isShortDog?1:0,midMajorBonus:isMM?1:0,
      confTourney:0.5,spreadVal:sv,restAdvantage:restAdv,
      awayB2B:sc.awayB2B?1:0,homeB2B:sc.homeB2B?1:0,
      travelFatigue:-(sc.travelPenalty||0),
      recentFormDiff:Math.min(10,Math.max(-10,formDiff))
    };
  }
  predict(f){
    const w=this.weights;
    return this.sigmoid((
      f.adjEM_diff*w.adjEM_diff+f.efg_diff*w.efg_diff+f.toRate_diff*w.toRate_diff+
      f.defRebound*w.defRebound+f.homeCourt*w.homeCourt+f.paceFactor*w.paceFactor+
      f.publicBias*w.publicBias+f.lineMovement*w.lineMovement+
      f.underdog_short*w.underdog_short+f.midMajorBonus*w.midMajorBonus+
      f.confTourney*w.confTourney+f.restAdvantage*w.restAdvantage+
      f.awayB2B*w.awayB2B+f.homeB2B*w.homeB2B+
      f.travelFatigue*w.travelFatigue+f.recentFormDiff*w.recentFormDiff
    )/10);
  }
  learn(f,p,a){
    const lr=this.weights.learningRate,err=a-p,grad=p*(1-p)*err;
    ['adjEM_diff','efg_diff','toRate_diff','defRebound','homeCourt','paceFactor',
     'publicBias','lineMovement','underdog_short','midMajorBonus','confTourney',
     'restAdvantage','awayB2B','homeB2B','travelFatigue','recentFormDiff'
    ].forEach(k=>{
      if(this.weights[k]!==undefined&&f[k]!==undefined){
        this.weights[k]+=lr*grad*f[k];
        this.weights[k]=Math.max(-6,Math.min(6,this.weights[k]));
      }
    });
    this.weights.totalPredictions++;
    if(Math.round(p)===a)this.weights.correctPredictions++;
    this.weights.calibrationError=Math.abs(p-a)*0.1+(this.weights.calibrationError||0)*0.9;
    return this.weights;
  }
  get accuracy(){const t=this.weights.totalPredictions;return t>0?((this.weights.correctPredictions/t)*100).toFixed(1):"—"}
  get winRate(){const t=this.weights.totalBets;return t>0?((this.weights.winningBets/t)*100).toFixed(1):"—"}
  save(){ss(SK.model,this.weights)}
}

// ── ESPN SCHEDULE ENGINE ──────────────────────────────────────────────────────
function espnDs(daysAgo){
  const d=new Date();d.setDate(d.getDate()-daysAgo);
  return d.toISOString().slice(0,10).replace(/-/g,"");
}
function matchESPN(dn){
  if(!dn)return null;
  if(TE[dn])return dn;
  const parts=dn.split(" ");
  for(let t=1;t<parts.length;t++){
    const a=parts.slice(0,parts.length-t).join(" ");
    if(TE[a])return a;
    const lo=a.toLowerCase(),f=Object.keys(TE).find(k=>k.toLowerCase()===lo);
    if(f)return f;
  }
  const nm=dn.toLowerCase();
  return Object.keys(TE).find(k=>k.length>=5&&nm.includes(k.toLowerCase()))||null;
}
async function buildESPNCache(){
  const cached=sg(SK.espn,null),now=Date.now();
  if(cached&&cached.ts&&(now-cached.ts)<ESPN_TTL)return{data:cached.data,source:"cached",ts:cached.ts,teams:Object.keys(cached.data||{}).length};
  const td={};let fetched=0;
  try{
    const prs=Array.from({length:10},(_,d)=>
      fetch(`${ESPN_BASE}/scoreboard?dates=${espnDs(d)}&limit=500`)
        .then(r=>r.ok?r.json():null).catch(()=>null)
    );
    const rr=await Promise.all(prs);
    rr.forEach((data)=>{
      if(!data||!data.events)return;
      fetched++;
      data.events.forEach(evt=>{
        const comp=evt.competitions?.[0];
        const st=comp?.status?.type;if(!st?.completed&&st?.name!=="STATUS_FINAL")return;
        const compTs=evt.competitions?.[0]?.competitors||[];
        const scores=Object.fromEntries(compTs.map(c=>[c.homeAway,parseInt(c.score)||0]));
        const margin=(scores.home||0)-(scores.away||0);
        const gameDate=new Date(evt.date);
        compTs.forEach(c=>{
          const k=matchESPN(c.team?.displayName||"");
          if(!k)return;
          const isHome=c.homeAway==="home",won=c.winner===true;
          const tm=isHome?margin:-margin;
          if(!td[k])td[k]={lastDate:null,games:[]};
          td[k].games.push({date:gameDate,won,isHome,margin:tm});
          if(!td[k].lastDate||gameDate>td[k].lastDate)td[k].lastDate=gameDate;
        });
      });
    });
    Object.values(td).forEach(t=>t.games.sort((a,b)=>b.date-a.date));
    if(fetched>0)ss(SK.espn,{ts:now,data:td});
    return{data:td,source:fetched>0?"live":"failed",ts:now,teams:Object.keys(td).length};
  }catch(e){
    console.warn("ESPN:",e.message);
    return{data:cached?.data||{},source:"failed",ts:cached?.ts||0,teams:0};
  }
}
// ── ESPN META ENGINE (rankings · injuries · neutral site · conf tourney · records) ──
async function fetchESPNMeta(){
  const cached=sg(SK.meta,null),now=Date.now();
  if(cached&&cached.ts&&(now-cached.ts)<1800000)return cached;
  const meta={ts:now,rankings:{},injuries:{},neutralGames:{},confTourneyGames:{},records:{}};
  try{
    const rRes=await fetch(`${ESPN_BASE}/rankings`).then(r=>r.ok?r.json():null).catch(()=>null);
    if(rRes?.rankings){
      rRes.rankings.forEach(poll=>{
        if(!(poll.name||"").includes("AP"))return;
        (poll.ranks||[]).forEach(r=>{
          const raw=r.team?.displayName||"";
          const k=normalizeTeamName(raw);
          const match=TE[k]?k:Object.keys(TE).find(t=>t.toLowerCase()===k.toLowerCase())||
            (()=>{const w=k.split(" ");for(let i=1;i<w.length;i++){const c=w.slice(0,w.length-i).join(" ");if(TE[c])return c;}return null;})();
          if(match)meta.rankings[match]=r.current;
        });
      });
    }
    const today=new Date().toISOString().slice(0,10).replace(/-/g,"");
    const tRes=await fetch(`${ESPN_BASE}/scoreboard?dates=${today}&groups=50&limit=300`).then(r=>r.ok?r.json():null).catch(()=>null);
    if(tRes?.events){
      tRes.events.forEach(evt=>{
        const comp=evt.competitions?.[0];if(!comp)return;
        const teams=comp.competitors||[];
        const away=teams.find(t=>t.homeAway==="away");
        const home=teams.find(t=>t.homeAway==="home");
        if(!away||!home)return;
        const awayN=away.team?.displayName||"";
        const homeN=home.team?.displayName||"";
        const gkey=`${awayN}@${homeN}`;
        if(comp.neutralSite)meta.neutralGames[gkey]=true;
        const notes=(comp.notes||[]).map(n=>(n.headline||n.text||"")).join(" ").toLowerCase();
        if(notes.includes("conference")||notes.includes("tourney")||notes.includes("tournament")||
           (evt.season?.slug||"").includes("tournament")||(evt.seasonType?.name||"").includes("Tournament")){
          meta.confTourneyGames[gkey]=true;
          meta.neutralGames[gkey]=true;
        }
        teams.forEach(t=>{
          const n2=normalizeTeamName(t.team?.displayName||"");
          const rec=(t.records||[]).find(r=>r.type==="total")||t.records?.[0];
          if(n2&&rec?.summary)meta.records[n2]=rec.summary;
        });
      });
    }
    const nRes=await fetch(`${ESPN_BASE}/news?limit=80`).then(r=>r.ok?r.json():null).catch(()=>null);
    if(nRes?.articles){
      nRes.articles.forEach(art=>{
        const hl=art.headline||"";
        const lo=hl.toLowerCase();
        if(!lo.includes("injur")&&!lo.includes(" out ")&&!lo.includes("questionable")&&
           !lo.includes("doubtful")&&!lo.includes("suspend")&&!lo.includes("day-to-day"))return;
        Object.keys(TE).forEach(tn=>{
          if(hl.includes(tn)||(tn.split(" ").length>1&&hl.toLowerCase().includes(tn.toLowerCase()))){
            if(!meta.injuries[tn])meta.injuries[tn]=[];
            if(meta.injuries[tn].length<3)meta.injuries[tn].push(hl);
          }
        });
      });
    }
    ss(SK.meta,meta);
  }catch(e){console.warn("ESPN meta:",e.message);}
  return meta;
}


function getSchedCtx(key,cache,gameDate){
  const data=cache?.[key];
  const gdt=gameDate?new Date(gameDate):new Date(),gms=gdt.getTime();
  if(!data?.games?.length)return{restDays:3,isB2B:false,recentWinPct:0.5,recentMargin:0,gamesFound:false};
  const prior=data.games.filter(g=>g.date.getTime()<gms-3600000);
  if(!prior.length)return{restDays:3,isB2B:false,recentWinPct:0.5,recentMargin:0,gamesFound:false};
  const last=prior[0];
  const restDays=Math.max(0,Math.round((gms-last.date.getTime())/86400000));
  const isB2B=restDays<=1;
  const recent=prior.slice(0,10);
  const recentWinPct=recent.length?recent.filter(g=>g.won).length/recent.length:0.5;
  const recentMargin=recent.length?recent.reduce((s,g)=>s+g.margin,0)/recent.length:0;
  return{restDays,isB2B,recentWinPct,recentMargin,gamesFound:true};
}

// ── TRAVEL FATIGUE ENGINE ─────────────────────────────────────────────────────
function haversineKm(la1,lo1,la2,lo2){
  const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getTravelFatigue(awayKey,homeKey,awayRest){
  const aw=AD[awayKey],ho=AD[homeKey];
  if(!aw||!ho)return{distKm:0,tzDelta:0,fatiguePenalty:0};
  const distKm=haversineKm(aw.lat,aw.lon,ho.lat,ho.lon);
  const tzDelta=ho.tz-aw.tz;
  let p=Math.floor(distKm/500)*0.40;
  if(awayRest<=1)p+=awayRest===0?3.2:1.1;
  if(tzDelta<0)p+=Math.abs(tzDelta)*0.55;
  if(tzDelta>0)p-=tzDelta*0.15;
  if(awayRest>=6)p+=0.8;
  return{distKm:Math.round(distKm),tzDelta,fatiguePenalty:+Math.max(0,p).toFixed(1)};
}

// Acronym aliases: Odds API full name → DB key
const ACRONYM_ALIASES={
  // UCF
  "Central Florida":"UCF",
  // FIU / FAU
  "FIU":"Florida International",
  "FAU":"Florida Atlantic",
  // VCU
  "UAB":"UAB",
  "Virginia Commonwealth":"VCU",
  // Louisiana schools

  "Louisiana Ragin Cajuns":"Louisiana",
  "Louisiana Ragin' Cajuns":"Louisiana",
  "UL Lafayette":"Louisiana",
  "UL Monroe":"Louisiana Monroe",
  "Louisiana-Monroe":"Louisiana Monroe",
  // Loyola Marymount
  "LMU":"Loyola Marymount",
  // Cal State
  "CSUN":"Cal State Northridge",
  "CS Fullerton":"Cal State Fullerton",
  // SIU Edwardsville
  "Southern Illinois Edwardsville":"SIUE",
  "SIU Edwardsville":"SIUE",
  // ETSU
  "East Tennessee State":"ETSU",
  // Houston Baptist (now Houston Christian)
  "Houston Christian":"Houston Baptist",
  // Ole Miss
  "Mississippi":"Ole Miss",
  // UMass
  "UMass":"Massachusetts",
  "Massachusetts Minutemen":"Massachusetts",
  // NC State
  "North Carolina State":"NC State",
  // Miami OH
  "Miami Ohio":"Miami OH",
  "Miami (OH)":"Miami OH",
  // Maryland-Eastern Shore
  "Maryland Eastern Shore":"Maryland-Eastern Shore",
  // Bethune-Cookman (DB has hyphen, ESPN sometimes omits)
  "Bethune Cookman":"Bethune-Cookman",
  // St. Joseph's → Saint Joseph
  "St. Joseph":"Saint Joseph",
  "Saint Joseph's":"Saint Joseph",
  // Stephen F. Austin
  "Stephen F. Austin":"Stephen F Austin",
  // UT Martin / Tennessee-Martin
  "UT Martin":"Tennessee Martin",
  "Tennessee Martin":"Tennessee Martin",
  "Tennessee-Martin":"Tennessee Martin",
  // UNCW
  "UNC Wilmington":"UNCW",
  "North Carolina Wilmington":"UNCW",
  // Arkansas schools
  "Arkansas Pine Bluff":"Arkansas Pine Bluff",
};
function normalizeTeamName(n){
  if(!n)return n;
  // First check acronym alias table (before any other transforms)
  if(ACRONYM_ALIASES[n])return ACRONYM_ALIASES[n];
  return n
    .replace(/-/g," ")                      // "Arkansas-Pine Bluff" → "Arkansas Pine Bluff"
    .replace(/\bInt'l\b/g,"International") // "Florida Int'l" → "Florida International"
    .replace(/\s*\(OH\)/g," OH")          // "Miami (OH)" → "Miami OH"
    .replace(/\bSt\s/g,"State ")           // "Alabama St " → "Alabama State "
    .replace(/\bSt$/,"State")               // trailing "St" → "State"
    .replace(/'\w*/g,"")                   // "John's" → "John", "Mary's" → "Mary"
    .replace(/\s+/g," ").trim();
}
function getEff(n){
  if(!n)return{rank:110,adjEM:0,adjO:100,adjD:100,pace:67,defReb:70,toRate:16,efg:50,name:"Unknown"};
  if(TE[n])return{...TE[n],name:n};
  const keys=Object.keys(TE);
  // Normalize: expand abbreviations, strip apostrophes
  const n2=normalizeTeamName(n);
  if(TE[n2])return{...TE[n2],name:n2};
  const lo=n2.toLowerCase();
  // Helper: case-insensitive exact match
  const exact=s=>keys.find(k=>k.toLowerCase()===s.toLowerCase());
  // 1. Exact match on normalized name
  let k=exact(n2);
  // 2. Progressive word stripping from the right (handles any mascot name)
  //    "Florida A&M Rattlers" → try "Florida A&M" → found ✓
  //    "Alabama State Hornets" → try "Alabama State" → found ✓
  //    Stops before candidate gets too short to be meaningful
  if(!k){
    const words=n2.split(" ");
    for(let trim=1;trim<words.length;trim++){
      const candidate=words.slice(0,words.length-trim).join(" ");
      if(candidate.length<2)break;
      // Also resolve through acronym alias table during strip
      const aliased=ACRONYM_ALIASES[candidate];
      if(aliased&&TE[aliased]){k=aliased;break;}
      const found=exact(candidate);
      if(found){k=found;break;}
    }
  }
  // 3. DB key fully contained in input with word boundaries
  //    Sorted longest-first so "Florida A&M" beats "Florida"
  if(!k){
    const sorted=[...keys].sort((a,b)=>b.length-a.length);
    k=sorted.find(k2=>{
      if(k2.length<2)return false;
      const kl=k2.toLowerCase();
      const idx=lo.indexOf(kl);
      if(idx===-1)return false;
      const before=idx===0||lo[idx-1]===" ";
      const after=idx+kl.length===lo.length||lo[idx+kl.length]===" ";
      return before&&after;
    });
  }
  return k?{...TE[k],name:k}:{rank:110,adjEM:0,adjO:100,adjD:100,pace:67,defReb:70,toRate:16,efg:50,name:n};
}

// ── KELLY SIZING ──────────────────────────────────────────────────────────────
function kellySize(prob,odds,br,cap){
  const b=odds>0?odds/100:100/Math.abs(odds),p=Math.min(0.95,Math.max(0.05,prob)),q=1-p;
  return +(Math.min(Math.max(0,(b*p-q)/b*0.25),cap||0.05)*br).toFixed(2);
}
function calcUnits(br){const u=br*0.02;return{unit:+u.toFixed(2),anchor:+(u*2.5).toFixed(2),core:+(u*1.5).toFixed(2),optional:+u.toFixed(2),maxDaily:+(br*0.12).toFixed(2)}}

// ── GAME ANALYSIS ─────────────────────────────────────────────────────────────
function analyzeGame(g,ml,br,espnData,meta){
  const home=g.home_team,away=g.away_team;
  const he=getEff(home),ae=getEff(away);
  const m=meta||{rankings:{},injuries:{},neutralGames:{},confTourneyGames:{},records:{}};
  // Odds parsing
  let hML=null,aML=null,hSp=null,hSpO=null,aSp=null,aSpO=null,openSp=null;
  const spHist=[];
  (g.bookmakers||[]).forEach((bm,bi)=>{
    (bm.markets||[]).forEach(mkt=>{
      if(mkt.key==="h2h")mkt.outcomes.forEach(o=>{
        if(o.name===home&&(!hML||o.price>hML))hML=o.price;
        if(o.name===away&&(!aML||o.price>aML))aML=o.price;
      });
      if(mkt.key==="spreads")mkt.outcomes.forEach(o=>{
        if(o.name===home){spHist.push(o.point);if(bi===0)openSp=o.point;if(!hSp||o.price>(hSpO||-9999)){hSp=o.point;hSpO=o.price;}}
        if(o.name===away&&!aSp){aSp=o.point;aSpO=o.price;}
      });
    });
  });
  const lm=(openSp!==null&&hSp!==null)?+(hSp-openSp).toFixed(1):null;
  // Line movement flag: >=1.5pt shift = sharp money signal
  const sharpMove=lm!==null&&Math.abs(lm)>=1.5;
  // Neutral site / conf tourney detection via ESPN meta
  const gkeyFwd=`${away}@${home}`;
  const gkeyRev=`${home}@${away}`;
  const isNeutral=!!(g.neutral_site||m.neutralGames[gkeyFwd]||m.neutralGames[gkeyRev]);
  const isConfTourney=!!(m.confTourneyGames[gkeyFwd]||m.confTourneyGames[gkeyRev]);
  // AP rankings
  const hRank=m.rankings[he.name]||null;
  const aRank=m.rankings[ae.name]||null;
  // Injury alerts
  const hInj=m.injuries[he.name]||[];
  const aInj=m.injuries[ae.name]||[];
  // W/L records
  const hRec=m.records[he.name]||null;
  const aRec=m.records[ae.name]||null;
  // Vig-free market prob
  const mlP=o=>o?(o<0?(-o)/(-o+100):100/(o+100)):0.5;
  const rh=mlP(hML),ra=mlP(aML),nm=rh+ra;
  const mktHP=nm>0?rh/nm:0.5;
  // ESPN schedule context
  const cache=espnData||{};
  const hCtx=getSchedCtx(he.name,cache,g.commence_time);
  const aCtx=getSchedCtx(ae.name,cache,g.commence_time);
  // If neutral site, travel calc is symmetric — use 0 home court
  const travel=isNeutral?{distKm:0,tzDelta:0,fatiguePenalty:0}:getTravelFatigue(ae.name,he.name,aCtx.restDays);
  // Conf tourney flag: ESPN-detected takes precedence over date heuristic
  const now2=new Date(),mo=now2.getMonth()+1,dy=now2.getDate();
  const ctDate=(mo===2&&dy>=20)||(mo===3&&dy<=15)?1.0:0.2;
  const ct=isConfTourney?1.0:ctDate;
  // Game flags
  const isMM=he.rank>50&&ae.rank>50;
  const isLF=hSp&&hSp<-10;
  const isSU=aSp&&aSp>0&&aSp<=4;
  const slow=Math.min(he.pace,ae.pace)<66;
  const emDiff=he.adjEM-ae.adjEM;
  const pubPen=Math.abs(emDiff+3.2)>20;
  // Features — pass isNeutral so home court weight is zeroed
  const schedCtx={
    homeRestDays:hCtx.restDays,awayRestDays:aCtx.restDays,
    homeB2B:hCtx.isB2B,awayB2B:aCtx.isB2B,
    travelPenalty:travel.fatiguePenalty,
    homeFormMargin:hCtx.recentMargin,awayFormMargin:aCtx.recentMargin,
  };
  const feats=ml.buildFeatures(he,ae,hSp,isNeutral?false:true,isMM,lm,schedCtx);
  feats.confTourney=ct;
  const modHP=ml.predict(feats);
  const edge=modHP-mktHP,absE=Math.abs(edge);
  const valSide=edge>0?home:away;
  const recOdds=edge>0?(hSpO||(-110)):(aSpO||(-110));
  const isVal=absE>0.04&&!pubPen;
  const es=Math.min(30,+(Math.abs(emDiff)*0.8+absE*30).toFixed(1));
  // Checklist
  const cl={
    efficiencyMismatch:Math.abs(emDiff)>8,noPublicBias:!pubPen,shortUnderdog:isSU,
    slowTempo:slow,defReboundEdge:Math.abs(he.defReb-ae.defReb)>3,
    midMajorEdge:isMM,valueDetected:isVal,noLargeFavorite:!isLF,
    homeMoreRested:hCtx.restDays>aCtx.restDays+1,awayB2BFlag:aCtx.isB2B,
    sharpLineMove:sharpMove,neutralSite:isNeutral,
  };
  const cs=Object.values(cl).filter(Boolean).length;
  const conf=Math.min(94,Math.round(50+es*1.4+absE*28+cs*1.6));
  const kellyWager=kellySize(edge>0?modHP:(1-modHP),recOdds,br,0.05);
  return{
    id:g.id||(home+away),home,away,he,ae,hML,aML,hSp,hSpO,aSp,aSpO,
    mktHP:(mktHP*100).toFixed(1),modHP:(modHP*100).toFixed(1),
    edge:edge.toFixed(3),es,isVal,valSide,conf,lm,sharpMove,isMM,isLF,isSU,slow,pubPen,
    isNeutral,isConfTourney,hRank,aRank,hInj,aInj,hRec,aRec,
    cl,cs,feats,kellyWager,commenceTime:g.commence_time,units:calcUnits(br),
    schedule:{
      homeRestDays:hCtx.restDays,awayRestDays:aCtx.restDays,
      homeB2B:hCtx.isB2B,awayB2B:aCtx.isB2B,
      homeForm:hCtx.recentWinPct,awayForm:aCtx.recentWinPct,
      homeFormMargin:hCtx.recentMargin,awayFormMargin:aCtx.recentMargin,
      travelKm:travel.distKm,tzDelta:travel.tzDelta,
      fatiguePenalty:travel.fatiguePenalty,
      liveData:hCtx.gamesFound||aCtx.gamesFound,
    },
  };
}

// ── CARD BUILDER ──────────────────────────────────────────────────────────────
const TH={anchor:{minConf:85,minEdge:18,max:1},core:{minConf:75,minEdge:10,max:2},optional:{minConf:68,minEdge:6,max:2}};
function buildCard(analyzed,br){
  const units=calcUnits(br);
  const elig=analyzed
    .filter(a=>{
      if(!a.hML||!a.hSp||a.isLF||a.he.rank>=108||a.ae.rank>=108)return false;
      const isAnchorQuality=a.conf>=TH.anchor.minConf&&a.es>=TH.anchor.minEdge;
      // Anchors bypass spread cap and public bias — elite edge/conf already prices these in
      if(isAnchorQuality)return true;
      return !a.pubPen&&Math.abs(parseFloat(a.hSp))<=10;
    })
    .sort((a,b)=>b.conf-a.conf);
  const picks=[];let exp=0,ac=0,cc=0,oc=0;
  for(const g of elig){
    if(picks.length>=5||exp>=units.maxDaily)break;
    let tier=null,w=0;
    if(g.conf>=TH.anchor.minConf&&g.es>=TH.anchor.minEdge&&ac<TH.anchor.max){tier="anchor";w=units.anchor;ac++;}
    else if(g.conf>=TH.core.minConf&&g.es>=TH.core.minEdge&&cc<TH.core.max){tier="core";w=units.core;cc++;}
    else if(g.conf>=TH.optional.minConf&&g.es>=TH.optional.minEdge&&oc<TH.optional.max){tier="optional";w=units.optional;oc++;}
    else continue;
    if(exp+w>units.maxDaily)continue;
    picks.push({...g,tier,wager:w,rank:picks.length+1});exp+=w;
  }
  const pickIds=new Set(picks.map(p=>p.id));
  const traps=analyzed.filter(a=>!pickIds.has(a.id)&&(a.pubPen||a.isLF||(a.cs<2&&parseFloat(a.mktHP)>75))).slice(0,3);
  return{picks,traps,exp:exp.toFixed(2),units,anchorCount:ac,coreCount:cc,optCount:oc};
}

// ── BANKROLL TAB ──────────────────────────────────────────────────────────────
function BankrollTab({bets,setBets,bankroll,setBankroll,ml,setResults,results}){
  const[form,setForm]=useState({game:"",pick:"",type:"Spread",wager:"",odds:"-110"});
  const[editBR,setEditBR]=useState(false);
  const[brIn,setBrIn]=useState("");
  const u=calcUnits(bankroll);
  const won=bets.filter(b=>b.result==="win").reduce((s,b)=>s+b.profit,0);
  const lost=bets.filter(b=>b.result==="loss").reduce((s,b)=>s+b.wager,0);
  const pending=bets.filter(b=>!b.result).reduce((s,b)=>s+b.wager,0);
  const tb=bets.filter(b=>b.result).length,wb=bets.filter(b=>b.result==="win").length;
  const roi=(won+lost)>0?(((won-lost)/(won+lost))*100).toFixed(1):"0.0";
  const prog=Math.max(0,Math.min(100,((bankroll-300)/700)*100));
  const scenarios=[{l:"3-1",w:3,lo:1},{l:"2-2",w:2,lo:2},{l:"4-0",w:4,lo:0},{l:"1-3",w:1,lo:3}].map(sc=>{const g2=sc.w*u.core*0.909,l2=sc.lo*u.core;return{...sc,net:(g2-l2).toFixed(2),proj:(bankroll+g2-l2).toFixed(2)}});
  function addBet(){
    if(!form.game||!form.wager)return;
    const w=parseFloat(form.wager),ml2=parseFloat(form.odds);
    const profit=ml2>0?w*(ml2/100):w*(100/Math.abs(ml2));
    const pts=form.game.split("@"),hEff=getEff(pts[1]?.trim()||""),aEff=getEff(pts[0]?.trim()||"");
    const bf=ml.buildFeatures(hEff,aEff,-3.5,true,hEff.rank>50&&aEff.rank>50,null,null);
    const ep=ml.predict(bf);
    const nb={id:Date.now(),...form,wager:w,profit:+profit.toFixed(2),result:null,date:new Date().toLocaleDateString(),predictedProb:ep,storedFeats:bf};
    setBets(p=>{const u2=[...p,nb];ss(SK.bets,u2);return u2});
    setForm(f=>({...f,game:"",pick:"",wager:""}));
  }
  function settle(id,result){
    const bet=bets.find(b=>b.id===id);if(!bet)return;
    setBets(p=>{const u2=p.map(b=>b.id===id?{...b,result}:b);ss(SK.bets,u2);return u2});
    const ao=result==="win"?1:0;
    const feats=bet.storedFeats||ml.buildFeatures(getEff(bet.game.split("@")[1]?.trim()||""),getEff(bet.game.split("@")[0]?.trim()||""),-3.5,true,false,null,null);
    const prob=bet.predictedProb||0.6;
    ml.learn(feats,prob,ao);ml.weights.totalBets++;
    if(result==="win")ml.weights.winningBets++;
    ml.save();
    const nr={game:bet.game,correct:ao===Math.round(prob),predictedProb:prob,result};
    setResults(r=>{const u2=[...r,nr];ss(SK.results,u2);return u2});
    const delta=result==="win"?bet.profit:-bet.wager;
    setBankroll(p=>{const u2=+(p+delta).toFixed(2);ss(SK.bankroll,u2);return u2});
  }
  return(
    <div style={{display:"grid",gridTemplateColumns:"min(300px,100%) 1fr",gap:"20px"}}>
      <div>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:"6px",padding:"16px",marginBottom:"12px"}}>
          <div style={{fontSize:"9px",color:T.muted,letterSpacing:"2px",marginBottom:"8px"}}>BANKROLL</div>
          {editBR?(
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"10px"}}>
              <input autoFocus type="number" value={brIn} onChange={e=>setBrIn(e.target.value)} style={{...s.input,fontSize:"22px",fontWeight:"700",color:T.green,width:"140px",padding:"6px 10px"}}
                onKeyDown={e=>{if(e.key==="Enter"){const v=parseFloat(brIn);if(!isNaN(v)&&v>0){setBankroll(v);ss(SK.bankroll,v);}setEditBR(false);}if(e.key==="Escape")setEditBR(false);}}/>
              <button onClick={()=>{const v=parseFloat(brIn);if(!isNaN(v)&&v>0){setBankroll(v);ss(SK.bankroll,v);}setEditBR(false);}} style={s.btn(T.green)}>SAVE</button>
              <button onClick={()=>setEditBR(false)} style={{...s.btn(T.surface,T.muted),border:`1px solid ${T.border}`}}>CANCEL</button>
            </div>
          ):(
            <div style={{display:"flex",alignItems:"baseline",gap:"10px",marginBottom:"10px"}}>
              <div style={{fontSize:"34px",fontWeight:"700",color:bankroll>=300?T.green:T.red,letterSpacing:"-1px",cursor:"pointer"}} onClick={()=>{setBrIn(bankroll.toString());setEditBR(true);}}>${bankroll.toLocaleString()}</div>
              <button onClick={()=>{setBrIn(bankroll.toString());setEditBR(true);}} style={{background:"transparent",border:`1px solid ${T.border}`,color:T.muted,fontSize:"9px",padding:"3px 8px",borderRadius:"3px",cursor:"pointer",fontFamily:"inherit"}}>EDIT</button>
            </div>
          )}
          <div style={{fontSize:"9px",color:T.muted,marginBottom:"10px"}}>TARGET $1,000 · STARTED $300</div>
          <div style={{height:"4px",background:T.surface,borderRadius:"2px",marginBottom:"4px"}}><div style={{height:"4px",width:`${prog}%`,background:`linear-gradient(90deg,${T.accent},${T.green})`,borderRadius:"2px"}}/></div>
          <div style={{fontSize:"9px",color:T.muted,display:"flex",justifyContent:"space-between",marginBottom:"12px"}}><span>$300</span><span style={{color:T.accent}}>{prog.toFixed(0)}%</span><span>$1,000</span></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px"}}>
            {[["WON",`$${won.toFixed(0)}`,T.green],["LOST",`$${lost.toFixed(0)}`,T.red],["ROI",`${roi}%`,parseFloat(roi)>=0?T.green:T.red]].map(([l,v,c])=>(
              <div key={l} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:"4px",padding:"8px",textAlign:"center"}}>
                <div style={{fontSize:"13px",fontWeight:"700",color:c}}>{v}</div>
                <div style={{fontSize:"8px",color:T.muted,marginTop:"2px"}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:"8px",fontSize:"10px",color:T.muted}}>RECORD:<span style={{color:T.green}}>{wb}W</span>-<span style={{color:T.red}}>{tb-wb}L</span> · PENDING:<span style={{color:T.gold}}>${pending.toFixed(2)}</span></div>
        </div>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:"6px",padding:"14px",marginBottom:"12px"}}>
          <div style={{fontSize:"9px",color:T.muted,letterSpacing:"2px",marginBottom:"8px"}}>UNITS (2% BASE)</div>
          {[["⭐ Anchor 2.5u",u.anchor,T.gold],["💰 Core 1.5u",u.core,T.green],["🎯 Optional 1u",u.optional,T.purple],["Max Daily 12%",u.maxDaily,T.red]].map(([l,v,c])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"5px"}}><span style={{color:T.muted}}>{l}</span><span style={{color:c,fontWeight:"700"}}>${v}</span></div>
          ))}
        </div>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:"6px",padding:"14px",marginBottom:"12px"}}>
          <div style={{fontSize:"9px",color:T.muted,letterSpacing:"2px",marginBottom:"8px"}}>SCENARIOS</div>
          {scenarios.map(sc=>(
            <div key={sc.l} style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"5px",padding:"5px 8px",background:T.surface,borderRadius:"3px"}}>
              <span style={{color:T.text,fontWeight:"700"}}>{sc.l}</span>
              <span style={{color:parseFloat(sc.net)>=0?T.green:T.red}}>{parseFloat(sc.net)>=0?"+":""}${sc.net}→<strong>${sc.proj}</strong></span>
            </div>
          ))}
        </div>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:"6px",padding:"14px"}}>
          <div style={{fontSize:"9px",color:T.muted,letterSpacing:"2px",marginBottom:"10px"}}>LOG BET</div>
          {[["game","Game (Away @ Home)"],["pick","Your pick"],["wager","Wager ($)"],["odds","Odds (-110)"]].map(([k,ph])=>(
            <input key={k} placeholder={ph} value={form[k]} type={k==="wager"||k==="odds"?"number":"text"} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))} style={{...s.input,marginBottom:"8px"}}/>
          ))}
          <div style={{display:"flex",gap:"6px",marginBottom:"8px",flexWrap:"wrap"}}>
            {["Spread","ML","Over","Under"].map(t=>(
              <button key={t} onClick={()=>setForm(p=>({...p,type:t}))} style={{background:form.type===t?T.accent:T.surface,color:form.type===t?"#000":T.muted,border:`1px solid ${form.type===t?T.accent:T.border}`,padding:"4px 10px",borderRadius:"3px",cursor:"pointer",fontFamily:"inherit",fontSize:"10px",fontWeight:"700"}}>{t}</button>
            ))}

          <button onClick={addBet} style={{...s.btn(T.accent),width:"100%"}}>+ ADD BET</button>

      </div>
      <div>
        <div style={{fontSize:"9px",color:T.muted,letterSpacing:"2px",marginBottom:"12px"}}>BET LEDGER — {bets.length} TOTAL</div>

        {[...bets].reverse().map(bet=>(

function MLTab({model,results,onReset}){
  const w=model.weights;
  const feats=Object.entries({
    "AdjEM Diff":w.adjEM_diff,"eFG% Diff":w.efg_diff,"Home Court":w.homeCourt,
    "TO Rate":w.toRate_diff,"Def Reb":w.defRebound,"Line Move":w.lineMovement,
    "Short Dog":w.underdog_short,"Travel Fatigue":w.travelFatigue,

    "Public Bias":w.publicBias,"Mid-Major":w.midMajorBonus,"Pace":w.paceFactor,
  }).filter(([,v])=>v!==undefined).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]));
  const bs=results.length>0
    ?(results.reduce((s,r)=>s+Math.pow(r.predictedProb-(r.result==="win"?1:0),2),0)/results.length).toFixed(3):"—";

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px"}}>

}

      metaRef.current=meta||{rankings:{},injuries:{},neutralGames:{},confTourneyGames:{},records:{}};
      setEspnStatus(result);
      setEspnLoading(false);
      setMetaStatus(Object.keys(meta.rankings||{}).length>0?"live":"partial");
    }).catch(()=>{
      setEspnLoading(false);
      setEspnStatus({source:"failed",ts:0,teams:0});
      setMetaStatus("failed");
    });
  },[]);

  const fetchOdds=useCallback(async(proxy=proxyUrl)=>{
    if(!proxy){setError("Enter proxy URL.");loadDemo();return;}
    setLoading(true);setError(null);
    try{
      const base=proxy.replace(/\/$/,"");
      const url=`${base}/odds/sports/${SPORT}/odds/?regions=${REGIONS}&markets=${MARKETS}&bookmakers=${BOOKMAKERS}&oddsFormat=american`;
      const res=await fetch(url);
      if(!res.ok)throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      setCallsLeft(res.headers.get("x-requests-remaining"));
      const data=await res.json();
      const e=data.map(g=>analyzeGame(g,ml,bankroll,espnRef.current,metaRef.current)).sort((a,b)=>b.conf-a.conf);
      setAnalyzed(e);setCard(buildCard(e,bankroll));setUpdated(new Date().toLocaleTimeString());
    }catch(e){setError(e.message);loadDemo(espnRef.current,metaRef.current);}
    finally{setLoading(false);}
  },[proxyUrl,bankroll]);

  useEffect(()=>{proxyUrl?fetchOdds():loadDemo();},[]);

  function resetModel(){mlRef.current=new MLModel(null);ss(SK.model,null);setResults([]);ss(SK.results,[]);}

  function refreshESPN(){
    ss(SK.espn,null);ss(SK.meta,null);setEspnStatus({source:"loading"});setEspnLoading(true);setMetaStatus("loading");
    Promise.all([buildESPNCache(), fetchESPNMeta()]).then(([r, meta])=>{
      espnRef.current=r.data||{};
      metaRef.current=meta||{rankings:{},injuries:{},neutralGames:{},confTourneyGames:{},records:{}};
      setEspnStatus(r);setEspnLoading(false);
      setMetaStatus(Object.keys(meta.rankings||{}).length>0?"live":"partial");
    });
  }

  const espnTeams=Object.keys(espnRef.current||{}).length;
  const espnAge=espnStatus.ts?Math.round((Date.now()-espnStatus.ts)/60000):0;
  const espnColor=espnStatus.source==="live"?T.green:espnStatus.source==="cached"?T.gold:espnStatus.source==="loading"||espnLoading?T.muted:T.red;

  const TABS=[{id:"card",label:"📋 Card"},{id:"odds",label:"📊 Games"},{id:"bankroll",label:"💰 Bankroll"},{id:"ml",label:"🤖 ML"}];

  return(
    <div style={{background:T.bg,minHeight:"100vh",color:T.text}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(180deg,#08101e,#07090f)",borderBottom:`1px solid ${T.border}`,padding:"12px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}}>
          <div>
            <div style={{fontSize:"15px",fontWeight:"700",color:T.accent,letterSpacing:"2px"}}>▸ NCAAMB EDGE <span style={{fontSize:"9px",color:T.muted}}>v5 · ESPN LIVE</span></div>
            <div style={{fontSize:"8px",color:T.muted,letterSpacing:"1px",marginTop:"2px"}}>{updated?`UPDATED ${updated}`:"LIVE ODDS · EFFICIENCY · SCHEDULE · TRAVEL"}{callsLeft?` · ${callsLeft} CALLS LEFT`:""}</div>
          </div>
          <div style={{display:"flex",gap:"12px",alignItems:"center"}}>
            <div style={{textAlign:"right"}}><div style={{fontSize:"8px",color:T.muted}}>BANKROLL</div><div style={{fontSize:"20px",fontWeight:"700",color:bankroll>=300?T.green:T.red}}>${bankroll.toLocaleString()}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:"8px",color:T.muted}}>ACCURACY</div><div style={{fontSize:"20px",fontWeight:"700",color:T.accent}}>{ml.accuracy}%</div></div>
            <button onClick={()=>fetchOdds()} disabled={loading} style={s.btn(loading?T.surface:T.accent)}>
              {loading?<span style={{display:"inline-block",width:"12px",height:"12px",border:`2px solid ${T.accent}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>:"↻"}
            </button>
          </div>
        </div>
      </div>

      {/* ESPN STATUS BAR */}
      <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"5px 16px",background:`${espnColor}08`,borderBottom:`1px solid ${espnColor}22`,fontSize:"9px",letterSpacing:"1px"}}>
        <span className={espnLoading?"pulse":""} style={{color:espnColor}}>{espnLoading?"⟳":espnStatus.source==="live"?"●":espnStatus.source==="cached"?"◑":"○"}</span>
        <span style={{color:espnColor,fontWeight:"700"}}>
          {espnLoading?"ESPN: SYNCING...":
           espnStatus.source==="live"?`ESPN LIVE · ${espnTeams} TEAMS TRACKED`:
           espnStatus.source==="cached"?`ESPN CACHED · ${espnTeams} TEAMS · ${espnAge}m AGO`:
           "ESPN OFFLINE · STATIC DATA ONLY"}
        </span>
        {(espnStatus.source==="live"||espnStatus.source==="cached")&&<span style={{color:T.muted}}>rest days · B2B · travel · rolling form active</span>}
        {metaStatus==="live"&&<span style={{color:T.green,fontSize:"8px"}}>· AP RANKS · INJURIES · NEUTRAL SITE</span>}
        {metaStatus==="partial"&&<span style={{color:T.gold,fontSize:"8px"}}>· PARTIAL META</span>}
        {espnStatus.source==="failed"&&<span style={{color:T.muted}}>schedule data unavailable</span>}
        <button onClick={refreshESPN} style={{marginLeft:"auto",background:"transparent",border:`1px solid ${T.border}`,color:T.muted,fontSize:"8px",padding:"2px 8px",borderRadius:"3px",cursor:"pointer",fontFamily:"inherit"}}>↺ REFRESH</button>
      </div>

      {/* PROXY SETUP */}
      {!proxyUrl&&(
        <div style={{background:`${T.gold}08`,border:`1px solid ${T.gold}33`,margin:"12px 16px",borderRadius:"6px",padding:"12px 16px"}}>
          <div style={{fontSize:"9px",color:T.gold,letterSpacing:"2px",marginBottom:"8px"}}>PROXY URL REQUIRED FOR LIVE ODDS</div>
          <div style={{display:"flex",gap:"8px"}}>
            <input placeholder="https://your-proxy.onrender.com" value={proxyInput} onChange={e=>setProxyInput(e.target.value)} style={{...s.input,flex:1}}/>
            <button onClick={()=>{setProxyUrl(proxyInput);ss(SK.proxy,proxyInput);fetchOdds(proxyInput);}} style={s.btn(T.gold)}>CONNECT</button>
          </div>
        </div>
      )}
      {error&&<div style={{background:`${T.red}0a`,border:`1px solid ${T.red}33`,margin:"0 16px 8px",borderRadius:"4px",padding:"8px 12px",fontSize:"10px",color:T.red}}>{error}</div>}

      {/* TABS */}
      <div style={{display:"flex",borderBottom:`1px solid ${T.border}`,padding:"0 16px",background:T.surface}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?T.accent:"transparent"}`,color:tab===t.id?T.accent:T.muted,padding:"10px 14px",cursor:"pointer",fontFamily:"inherit",fontSize:"10px",fontWeight:"700",letterSpacing:"1px"}}>{t.label}</button>
        ))}
      </div>

      {/* CONTENT */}
      <div style={{padding:"16px",maxWidth:"1400px",margin:"0 auto"}}>

        {tab==="card"&&card&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr min(280px,35%)",gap:"16px"}}>
            <div>
              <div style={{fontSize:"9px",color:T.muted,letterSpacing:"2px",marginBottom:"12px"}}>TODAY'S PICKS · TAP TO EXPAND</div>
              {card.picks.length===0
                ?<div style={{textAlign:"center",color:T.muted,padding:"60px",border:`1px dashed ${T.border}`,borderRadius:"6px",fontSize:"11px"}}>NO QUALIFYING PICKS TODAY<br/><span style={{fontSize:"9px",marginTop:"8px",display:"block"}}>Lower thresholds or wait for better spots</span></div>
                :card.picks.map((p,i)=>(
                  <PickCard key={p.id} pick={p} showDetail={i===0} bets={bets} onPlace={(betData,removeId)=>{
                    if(removeId){setBets(prev=>{const u=[...prev].filter(b=>b.id!==removeId);ss(SK.bets,u);return u;});}
                    else{const ml2=parseFloat(betData.odds),w=parseFloat(betData.wager),profit=ml2>0?w*(ml2/100):w*(100/Math.abs(ml2));const nb={id:Date.now(),...betData,wager:w,profit:+profit.toFixed(2),result:null,date:new Date().toLocaleDateString()};setBets(prev=>{const u=[...prev,nb];ss(SK.bets,u);return u;});}
                  }}/>
                ))
              }
            </div>
            <div>
              {card.traps.length>0&&(
                <div style={{background:T.card,border:`1px solid ${T.red}33`,borderRadius:"6px",padding:"14px",marginBottom:"12px"}}>
                  <div style={{fontSize:"9px",color:T.red,letterSpacing:"2px",marginBottom:"10px"}}>🚫 AVOID — TRAPS</div>
                  {card.traps.map((g,i)=>(
                    <div key={i} style={{padding:"7px 10px",background:`${T.red}08`,border:`1px solid ${T.red}22`,borderRadius:"4px",marginBottom:"6px"}}>
                      <div style={{fontSize:"11px",fontWeight:"700",color:T.text,marginBottom:"2px"}}>{g.ae.name} @ {g.he.name}</div>
                      <div style={{fontSize:"10px",color:T.muted}}>Spread:{fml(g.hSp)} · {g.pubPen?"Public bias":"Large fav"}</div>
                    </div>
                  ))}
                </div>
              )}
              <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:"6px",padding:"14px",marginBottom:"12px"}}>
                <div style={{fontSize:"9px",color:T.muted,letterSpacing:"2px",marginBottom:"10px"}}>TODAY'S SUMMARY</div>
                {[["Picks",card.picks.length,T.accent],["Anchor",card.anchorCount,T.gold],["Core",card.coreCount,T.green],["Value",card.optCount,T.purple],["Exposure",`$${card.exp}`,T.text]].map(([l,v,c])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"5px"}}><span style={{color:T.muted}}>{l}</span><span style={{color:c,fontWeight:"700"}}>{v}</span></div>
                ))}
              </div>
              {espnTeams>0&&(
                <div style={{background:T.card,border:`1px solid ${T.green}33`,borderRadius:"6px",padding:"14px"}}>
                  <div style={{fontSize:"9px",color:T.green,letterSpacing:"2px",marginBottom:"8px"}}>📡 ESPN LIVE DATA</div>
                  <div style={{fontSize:"10px",color:T.muted,lineHeight:"1.9"}}><span style={{color:T.text}}>{espnTeams}</span> teams tracked<br/>Rest · B2B · Travel · Timezone · Rolling form</div>
                  {card.picks.some(p=>p.schedule?.awayB2B)&&<div style={{marginTop:"8px",padding:"5px 8px",background:`${T.orange}10`,border:`1px solid ${T.orange}33`,borderRadius:"3px",fontSize:"10px",color:T.orange}}>⚡ B2B away — fatigue applied</div>}
                  {card.picks.some(p=>(p.schedule?.travelKm||0)>800)&&<div style={{marginTop:"6px",padding:"5px 8px",background:`${T.purple}10`,border:`1px solid ${T.purple}33`,borderRadius:"3px",fontSize:"10px",color:T.purple}}>✈ Long travel — penalty applied</div>}
                </div>
              )}
            </div>
          </div>
        )}

        {tab==="odds"&&(
          <div>
            <div style={{fontSize:"9px",color:T.muted,letterSpacing:"2px",marginBottom:"14px"}}>ALL GAMES — TAP TO EXPAND</div>
            {analyzed.map((a,i)=>{
              const u=calcUnits(bankroll),tier=a.conf>=TH.anchor.minConf&&a.es>=TH.anchor.minEdge?"anchor":a.conf>=TH.core.minConf&&a.es>=TH.core.minEdge?"core":"optional";
              const wager=tier==="anchor"?u.anchor:tier==="core"?u.core:u.optional;
              return <PickCard key={a.id} pick={{...a,tier,wager,rank:i+1}}/>;
            })}
          </div>
        )}

        {tab==="bankroll"&&<BankrollTab bets={bets} setBets={setBets} bankroll={bankroll} setBankroll={setBankroll} ml={ml} setResults={setResults} results={results}/>}
        {tab==="ml"&&<MLTab model={ml} results={results} onReset={resetModel}/>}
      </div>

      <div style={{borderTop:`1px solid ${T.border}`,padding:"12px 16px",textAlign:"center",fontSize:"8px",color:T.muted}}>
        ⚠ FOR ENTERTAINMENT ONLY · GAMBLE RESPONSIBLY · VERIFY LEGALITY IN YOUR JURISDICTION
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
