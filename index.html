const avgPace=(he.pace+ae.pace)/2;
const h1Ratio=0.455+Math.max(0,(avgPace-67)*0.001);
let projFull=(he.adjO+ae.adjO)/2*(avgPace/67)*2;
let proj1H=projFull*h1Ratio;
if(hs&&as_){
const espnProj=(hs.avgH1Scored+as_.avgH1Allowed+as_.avgH1Scored+hs.avgH1Allowed)/2;
proj1H=proj1H*0.35+espnProj*0.65;
}
return{proj:+proj1H.toFixed(1),ratio:+h1Ratio.toFixed(3),hasESPN:!!(hs&&as_),hStats:hs,aStats:as_};
}

function analyze1HPick(home,away,marketLine,espnData){
/* PATCH 1 — CALIBRATION GUARD
   Real 1H lines: power conf 62–75, mid-major 55–65, absolute range 35–85.
   Full-game totals (120–170) must never reach this function.
   If marketLine is out of range, bail immediately — no pick, no false edge. */
if(!marketLine||marketLine>85||marketLine<35)return null;

const he=getEff(home),ae=getEff(away);
const{proj,ratio,hasESPN,hStats,aStats}=calc1HTotal(he,ae,espnData);
const edge=proj-marketLine;
const absEdge=Math.abs(edge);
if(absEdge<0.8)return null;
const side=edge>0?"OVER":"UNDER";
const conf=Math.min(88,Math.round(50+absEdge*4.5+(hasESPN?8:0)));
if(conf<62)return null;
return{home,away,proj,marketLine,edge:+edge.toFixed(1),side,conf,hasESPN,hStats,aStats,ratio};
}

<div style={{display:'flex',gap:8,marginBottom:12,padding:12,background:T.surface,borderRadius:8,border:`1px solid ${T.border}`}}>
{[['W',wins,T.green],['L',losses,T.red],['P',pushes,T.muted]].map(([l,v,c])=><div key={l} style={{flex:1,textAlign:'center'}}><div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div><div style={{fontSize:10,color:T.muted}}>{l}</div></div>)}
<div style={{flex:1,textAlign:'center'}}><div style={{fontSize:18,fontWeight:700,color:T.gold}}>{wr}%</div><div style={{fontSize:10,color:T.muted}}>WIN%</div></div>
<div style={{flex:1,textAlign:'center'}}><div style={{fontSize:18,fontWeight:700,color:totalPnl>=0?T.green:T.red}}>{totalPnl>=0?'+':''}{totalPnl.toFixed(0)}</div><div style={{fontSize:10,color:T.muted}}>PNL $</div></div>
<div style={{flex:1,textAlign:'center'}}><div style={{fontSize:18,fontWeight:700,color:parseFloat(roi)>=0?T.green:T.red}}>{roi}%</div><div style={{fontSize:10,color:T.muted}}>ROI</div></div>
</div>
{pending.length>0&&<div><div style={{fontSize:11,color:T.muted,marginBottom:8}}>PENDING ({pending.length})</div>
{savedBets.map((b,i)=>b.status==='pending'&&<PickCard key={b.id||i} pick={b} idx={i} onGrade={gradeBet}/>)}</div>}
{results.length>0&&<div style={{marginTop:12}}><div style={{fontSize:11,color:T.muted,marginBottom:8}}>GRADED ({results.length})</div>
{[...results].reverse().slice(0,20).map((r,i)=><div key={i} style={{background:T.card,border:`1px solid ${r.result==='W'?T.green+'44':r.result==='L'?T.red+'44':T.border}`,borderRadius:8,padding:'8px 10px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
<div><span style={{fontWeight:700,color:r.result==='W'?T.green:r.result==='L'?T.red:T.muted,fontSize:12}}>{r.result}</span><span style={{marginLeft:8,fontSize:12,color:T.text}}>{r.side}</span><span style={{marginLeft:6,fontSize:11,color:T.muted}}>{r.home} v {r.away}</span></div>
<span style={{fontSize:12,color:T.muted}}>{r.result==='W'?'+':(r.result==='L'?'-':'±')}{r.wager}</span>
</div>)}
</div>}
</div>}

{/* SETTINGS TAB */}
{tab==='settings'&&<div>
{C.section('Bankroll',<div style={{display:'flex',gap:8,alignItems:'center'}}>
<input type="number" value={bankroll} onChange={e=>setBankroll(parseFloat(e.target.value)||1000)} style={{flex:1,background:T.card,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,padding:'8px 10px',fontSize:14}}/>
<Btn onClick={()=>showMsg('Bankroll saved!')} color={T.green}>Save</Btn>
</div>)}
{C.section('Daily Max %',<div style={{display:'flex',gap:8,alignItems:'center'}}>
<input type="number" min={0.05} max={0.30} step={0.01} value={dmp} onChange={e=>setDmp(parseFloat(e.target.value)||0.12)} style={{flex:1,background:T.card,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,padding:'8px 10px',fontSize:14}}/>
<span style={{fontSize:11,color:T.muted}}>Max: ${+(bankroll*dmp).toFixed(0)}/day</span>
</div>)}
{C.section('Proxy URL',<div>
<input value={proxyUrl} onChange={e=>{setProxyUrl(e.target.value);ss(SK.proxy,e.target.value);}} placeholder="https://your-proxy.onrender.com" style={{width:'100%',background:T.card,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,padding:'8px 10px',fontSize:12,marginBottom:6}}/>
<div style={{fontSize:10,color:T.muted}}>Render.com proxy that injects Odds API key</div>
</div>)}
{C.section('ML Model',<>
{C.row('Accuracy',`${ml.accuracy}%`)}
{C.row('Bet W%',`${ml.winRate}%`)}
{C.row('Total preds',ml.weights.totalPredictions)}
{C.row('adjEM weight',ml.weights.adjEM_diff?.toFixed(3))}
<Btn onClick={()=>{const fresh=new MLModel(null);Object.assign(ml.weights,fresh.weights);ml.save();showMsg('Model reset',T.orange);}} color={T.red} style={{marginTop:8,fontSize:11}}>Reset Model</Btn>
</>)}
{C.section('Data',<>
<Btn onClick={()=>{ss(SK.espn,null);loadESPN();showMsg('ESPN cache cleared');}} color={T.muted} style={{fontSize:11,marginRight:8}}>Clear ESPN Cache</Btn>
<Btn onClick={()=>{ss(SK.h1,{});showMsg('1H lines cleared',T.muted);}} color={T.muted} style={{fontSize:11}}>Clear 1H Lines</Btn>
</>)}
</div>}
</div>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
